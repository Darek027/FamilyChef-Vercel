<script>
        lucide.createIcons();
        let currentRecipeData = null;
        let allSavedRecipes = [];
        let filteredRecipes = [];
        let currentUserEmail = null;
        let currentUserProfile = null;
       
        let uniqueCategories = [];
        let selectedRecipesForShopping = [];


        // ===============================================
        // LOGIKA ZAKUPÓW (WIELE LIST) - V 1.28.0
        // ===============================================


        let allShoppingLists = [];
        let activeShoppingListId = null;
        let activeShoppingTitle = "";
        let activeShoppingListArray = [];


        window.onload = function() {
            lucide.createIcons();
            const storedEmail = localStorage.getItem('familyChefEmail');
            const magicEmail = window.MAGIC_LINK_EMAIL;
           
            // LOGIKA KASKADOWA:
            if (magicEmail && magicEmail !== "") {
                localStorage.setItem('familyChefEmail', magicEmail);
                verifyUserInDatabase(magicEmail);
            } else if (storedEmail) {
                verifyUserInDatabase(storedEmail);
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        };


        function processAuth() {
            const emailInput = document.getElementById('loginEmail').value.trim().toLowerCase();
            if (!emailInput || !emailInput.includes('@')) return alert("Błędny email");
            document.getElementById('authBtn').innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Autoryzacja...`;
            verifyUserInDatabase(emailInput);
        }


// WERSJA 2.0.0 - MIGRACJA NA VERCEL: Logowanie (Supabase API)
        async function verifyUserInDatabase(email) {
            try {
                // 1. Uderzamy do naszego nowego bezserwerowego endpointu na Vercelu
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const res = await response.json();

                if (res.status === 'success') {
                    // 2. Autoryzacja udana - zapisujemy dane sesji
                    localStorage.setItem('familyChefEmail', res.data.email);
                    currentUserEmail = res.data.email; 
                    currentUserProfile = res.data;
                    
                    // 3. Odblokowanie interfejsu (Zdejmujemy Paywall/Auth)
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('flex');
                    
                    // UWAGA: Funkcje pobierające dane są tymczasowo wyciszone, 
                    // dopóki nie zbudujemy dla nich endpointów w kolejnym kroku!
                    // loadDashboard();
                    // fetchShoppingLists();
                    
                    lucide.createIcons();
                } else {
                    document.getElementById('authErrorMsg').innerText = res.message;
                    document.getElementById('authErrorMsg').classList.remove('hidden');
                    document.getElementById('authBtn').innerHTML = `<i data-lucide="log-in" class="w-5 h-5"></i> Wejdź`;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('authErrorMsg').innerText = "Krytyczny błąd połączenia z serwerem.";
                document.getElementById('authErrorMsg').classList.remove('hidden');
                document.getElementById('authBtn').innerHTML = `<i data-lucide="log-in" class="w-5 h-5"></i> Wejdź`;
            }
        }
       
        function logoutUser() { localStorage.removeItem('familyChefEmail'); location.reload(); }


        function switchTab(tabName) {
            ['generator', 'dashboard', 'shopping', 'profile'].forEach(tab => {
                document.getElementById('tab-' + tab).className = "py-4 font-semibold text-slate-500 border-b-2 border-transparent hover:text-brand-600 flex items-center gap-2 transition-colors shrink-0";
                document.getElementById('view-' + tab).classList.add('hidden');
            });
            document.getElementById('tab-' + tabName).className = "py-4 font-bold text-brand-600 border-b-2 border-brand-600 flex items-center gap-2 transition-colors shrink-0";
            document.getElementById('view-' + tabName).classList.remove('hidden');


            if(tabName === 'dashboard') { loadDashboard(); document.getElementById('shoppingListFab').style.display = selectedRecipesForShopping.length > 0 ? 'block' : 'none'; }
            else { document.getElementById('shoppingListFab').style.display = 'none'; }
           
            if(tabName === 'shopping') showShoppingDash(); // Przełącza na Dashboard list
            if(tabName === 'profile') loadProfileData();
        }


// WERSJA 4.1.1 - MIGRACJA NA VERCEL: Ładowanie Dashboardu (Poprawione UI)
        async function loadDashboard() {
            var grid = document.getElementById("dashboard-grid");
            grid.innerHTML = `<div class="col-span-full text-center py-12"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto text-teal-600 mb-2"></i><p class="text-slate-500 font-semibold">Wczytuję z bazy...</p></div>`;
            lucide.createIcons();

            try {
                const response = await fetch(`/api/get-dashboard?email=${encodeURIComponent(currentUserEmail)}`);
                const res = await response.json();

                if (res.status === 'success') {
                    // Przypisujemy do TWOJEJ zmiennej globalnej!
                    allSavedRecipes = res.recipes || [];
                    
                    // Aktualizujemy kategorie do filtrów
                    uniqueCategories = [...new Set(allSavedRecipes.map(r => r.category).filter(Boolean))];
                    
                    populateFilters(); // Ładuje filtry na górze strony
                    applyFilters();    // Renderuje grid używając renderGrid()

                    // Pamiętaj: Jeśli dodałeś też odczyt list zakupów, zrobimy to w fetchShoppingLists.
                } else {
                    grid.innerHTML = `<p class="col-span-full text-red-500 text-center font-bold">Błąd: ${res.message}</p>`;
                }
            } catch (error) {
                console.error("Dashboard Fetch Error:", error);
                grid.innerHTML = `<p class="col-span-full text-red-500 text-center font-bold">Krytyczny błąd połączenia z serwerem.</p>`;
            }
        }


        function populateFilters() {
            const userSelect = document.getElementById('filterUser');
            const catSelect = document.getElementById('filterCategory');
            userSelect.innerHTML = '<option value="all">👨‍👩‍👧 Wszyscy kucharze</option>';
            catSelect.innerHTML = '<option value="all">🍽️ Wszystkie kategorie</option>';
           
            const users = [...new Set(allSavedRecipes.map(r => String(r.author).trim().toLowerCase()))];

// WERSJA 4.2.1 - API VERCEL: Pobieranie pełnego przepisu po kliknięciu
        async function openRecipe(id) {
            // Włączamy loader z Kreatora
            startLoadingProcess("Pobieram przepis z bazy...");
            
            try {
                // Uderzamy do Twojego nowego endpointu Vercel!
                const response = await fetch(`/api/get-recipe?id=${id}`);
                const recipe = await response.json();

                if (recipe && !recipe.status) { // Jeśli nie ma błędu statusu
                    currentRecipeData = {
                        id: recipe.id,
                        author: recipe.author_email,
                        title: recipe.title,
                        ingredients: recipe.ingredients,
                        instructions: recipe.instructions,
                        category: recipe.category || 'Inne'
                    };
                    
                    // Renderowanie UI
                    populateCategoryDropdown(currentRecipeData.category);
                    document.getElementById("recipeTitle").innerText = currentRecipeData.title;
                    
                    var ingList = document.getElementById("recipeIngredients");
                    ingList.innerHTML = ""; currentRecipeData.ingredients.forEach(i => { if(i) { let li = document.createElement("li"); li.innerText = i; ingList.appendChild(li); }});
                    
                    var instList = document.getElementById("recipeInstructions");
                    instList.innerHTML = ""; currentRecipeData.instructions.forEach(i => { if(i) { let li = document.createElement("li"); li.innerText = i; instList.appendChild(li); }});

                    // Aktywujemy widok z zapisanym stanem
                    setActionButtonsMode(true);
                    switchTab('generator'); // Przełącza widok na Kreator
                    document.getElementById("recipeContainer").classList.remove("hidden");
                    document.getElementById("feedbackContainer").style.display = "block";
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    
                    // Wyłączamy loader
                    document.getElementById("loadingMsg").classList.add("hidden"); 
                    document.getElementById("submitBtn").disabled = false;
                } else {
                    alert("Błąd: " + (recipe.message || "Nie udało się pobrać przepisu."));
                    onFailure({message: "Anulowano"});
                }
            } catch (error) {
                console.error("Error fetching recipe details:", error);
                alert("Krytyczny błąd połączenia.");
                onFailure({message: "Anulowano"});
            }
        }


// WERSJA 3.0.0 - MIGRACJA NA VERCEL: Silnik AI (askChef & sendFeedback)
        async function askChef() {
            var inputField = document.getElementById("userInput");
            if (!inputField.value) return alert("Wpisz pomysł!");
            startLoadingProcess("Szef kuchni pracuje... 👨‍🍳");
            
            try {
                // Uderzamy do nowego serwera na Vercelu zamiast do Google Apps Script
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUserEmail,
                        userMessage: inputField.value,
                        isAdjustment: false,
                        previousRecipe: null
                    })
                });
                
                const res = await response.json();
                
                if (res.status === 'success') {
                    // Pakujemy odpowiedź tak, by stare funkcje UI (onSuccess) ją zrozumiały
                    onSuccess({ status: "success", data: res.recipe });
                    inputField.value = "";
                } else {
                    onFailure({ message: res.message });
                }
            } catch (error) {
                console.error(error);
                onFailure({ message: "Krytyczny błąd połączenia z serwerem." });
            }
        }

        async function sendFeedback() {
            var feedbackInput = document.getElementById("feedbackInput");
            if (!feedbackInput.value) return alert("Napisz co zmienić!");
            startLoadingProcess("Koryguję... 🔄");
            
            try {
                // Uderzamy do Vercela w trybie "Pętli Konwersacyjnej"
                const response = await fetch('/api/generate', {
                    method: 'POST',

                        email: currentUserEmail,
                        userMessage: feedbackInput.value,

                    })

                } else {
                    onFailure({ message: res.message });
                }
            } catch (error) {
                console.error(error);
                onFailure({ message: "Krytyczny błąd połączenia z serwerem." });
            }

        function startLoadingProcess(msg) {
            document.getElementById("loadingMsg").innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>${msg}</span>`;
            document.getElementById("loadingMsg").classList.remove("hidden"); document.getElementById("loadingMsg").classList.add("flex");
            document.getElementById("recipeContainer").classList.add("hidden"); document.getElementById("submitBtn").disabled = true; lucide.createIcons();
        }


        function onSuccess(response) {
            document.getElementById("loadingMsg").classList.add("hidden"); document.getElementById("submitBtn").disabled = false;
            if (response.status === "success") {
                currentRecipeData = response.data;
                populateCategoryDropdown(currentRecipeData.category || "Inne");
                document.getElementById("recipeTitle").innerText = currentRecipeData.title;
                var ingList = document.getElementById("recipeIngredients");
                ingList.innerHTML = ""; currentRecipeData.ingredients.forEach(i => { let li = document.createElement("li"); li.innerText = i; ingList.appendChild(li); });
                var instList = document.getElementById("recipeInstructions");
                instList.innerHTML = ""; currentRecipeData.instructions.forEach(i => { let li = document.createElement("li"); li.innerText = i; instList.appendChild(li); });
                setActionButtonsMode(false);
                document.getElementById("recipeContainer").classList.remove("hidden");
                document.getElementById("feedbackContainer").style.display = "block";
                document.getElementById("feedbackInput").value = "";
            } else alert("Błąd: " + response.message);
        }


        function onFailure(error) {
            document.getElementById("loadingMsg").classList.add("hidden"); document.getElementById("submitBtn").disabled = false;
            alert("Błąd połączenia: " + error.message);
        }

// WERSJA 4.4.0 - MIGRACJA NA VERCEL: Pobieranie list zakupów z API
        async function fetchShoppingLists() {
            document.getElementById('shoppingListsGrid').innerHTML = `<div class="col-span-full text-center py-10 text-slate-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i></div>`;
            lucide.createIcons();
            
            try {
                const response = await fetch(`/api/get-shopping-lists?email=${encodeURIComponent(currentUserEmail)}`);
                const res = await response.json();

                if (res.status === 'success') {
                    // Magia Vercel + Supabase (JSONB): dane są od razu gotowe, nie trzeba robić JSON.parse() jak w Google Apps Script
                    allShoppingLists = res.lists.map(listObj => {
                        return {
                            id: listObj.id,
                            title: listObj.title,
                            date: listObj.created_at,       // Zmiana nazwy kolumny pod Supabase
                            author: listObj.author_email,   // Zmiana nazwy kolumny pod Supabase
                            data: listObj.data              // Natywny obiekt JSON
                        };
                    });
                    
                    renderShoppingListsDash();
                } else {
                    document.getElementById('shoppingListsGrid').innerHTML = `<div class="col-span-full text-center text-red-500">Błąd pobierania list: ${res.message}</div>`;
                }
            } catch (error) {
                console.error("Krytyczny błąd zapytania:", error);
                document.getElementById('shoppingListsGrid').innerHTML = `<div class="col-span-full text-center text-red-500 font-bold">Krytyczny błąd połączenia z bazą. Odśwież stronę.</div>`;
            }
        }

        function renderShoppingListsDash() {
            const grid = document.getElementById('shoppingListsGrid');
            grid.innerHTML = '';
           
            if (allShoppingLists.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 bg-white rounded-3xl border border-slate-100 shadow-sm">Nie masz żadnych list zakupów. Zaznacz przepisy w Bazie i kliknij 'Stwórz Listę'.</div>`;
                return;
            }


            allShoppingLists.forEach(list => {
                let totalItems = 0; let checkedItems = 0;
                list.data.forEach(g => g.items.forEach(i => { totalItems++; if(i.checked) checkedItems++; }));
                const progress = totalItems === 0 ? 0 : Math.round((checkedItems/totalItems)*100);


                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:border-brand-300 hover:shadow-md transition cursor-pointer relative flex flex-col";
                card.onclick = () => openShoppingListDetail(list.id);


                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 pr-8">
                        <h3 class="font-bold text-slate-900 leading-tight">${list.title}</h3>
                    </div>
                    <button onclick="event.stopPropagation(); deleteShoppingListFromDash('${list.id}')" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition z-20"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    <p class="text-xs text-slate-400 mb-4 font-mono"><i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>${new Date(list.date).toLocaleDateString()} • ${String(list.author).split('@')[0]}</p>
                   
                    <div class="mt-auto w-full bg-slate-100 rounded-full h-2.5 mb-1 overflow-hidden">
                        <div class="bg-brand-500 h-2.5 rounded-full transition-all" style="width: ${progress}%"></div>
                    </div>
                    <div class="text-xs text-right text-slate-500 font-bold">${checkedItems}/${totalItems} produktów</div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

                const grpDiv = document.createElement('div');
                grpDiv.innerHTML = `<h3 class="font-bold text-brand-600 mb-2 border-b border-brand-50 pb-1">${group.category}</h3>`;
               
                const ul = document.createElement('div'); ul.className = "space-y-2";
                group.items.forEach((item, iIndex) => {
                    const checkedClass = item.checked ? 'item-checked' : 'bg-white border-slate-100 shadow-sm hover:border-brand-200';
                    const icon = item.checked ? `<i data-lucide="check-square" class="text-brand-500 w-5 h-5"></i>` : `<i data-lucide="square" class="text-slate-300 w-5 h-5"></i>`;
                    ul.innerHTML += `
                        <div onclick="toggleShoppingItem(${gIndex}, ${iIndex})" class="flex items-start gap-3 p-3 rounded-xl border transition cursor-pointer ${checkedClass}">
                            <div class="mt-0.5 shrink-0">${icon}</div>
                            <span class="text-sm font-semibold">${item.name}</span>
                        </div>
                    `;
                });
                grpDiv.appendChild(ul);
                content.appendChild(grpDiv);
            });
            lucide.createIcons();
        }
// WERSJA 4.6.0 - MIGRACJA NA VERCEL: Wysyłka e-maili przez API
        async function confirmAndSend() {
            if (!currentRecipeData) return;
            var isSavedMode = currentRecipeData.id ? true : false;
            var btnId = isSavedMode ? "actionButtonsSaved" : "saveEmailBtn";
            var btn = isSavedMode ? document.querySelector('#actionButtonsSaved button') : document.getElementById(btnId);
            var originalHtml = btn.innerHTML;
            
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Wysyłanie...`;
            btn.disabled = true; lucide.createIcons();
            
            try {
                const response = await fetch('/api/send-recipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUserEmail, recipe: currentRecipeData })
                });
                const res = await response.json();
                
                if (res.status === 'success') {
                    alert(res.message);
                    btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> Wysłano i Zapisano!`;
                    lucide.createIcons();
                    setTimeout(() => {
                        // KRYTYCZNE: Przypisujemy ID z bazy, żeby przycisk "Zapisz" zniknął
                        currentRecipeData.id = res.recipeId; 
                        setActionButtonsMode(true);
                        btn.innerHTML = originalHtml; btn.disabled = false; lucide.createIcons();
                    }, 3000);
                } else {
                    alert("Błąd: " + res.message);
                    btn.innerHTML = originalHtml; btn.disabled = false; lucide.createIcons();
                }
            } catch (error) {
                alert("Krytyczny błąd połączenia z serwerem.");
                btn.innerHTML = originalHtml; btn.disabled = false; lucide.createIcons();
            }
        }

        async function sendShoppingPDF() { // Pozostawiam oryginalną nazwę dla kompatybilności z przyciskiem HTML
            const btn = document.getElementById('sendShoppingEmailBtn'); const oHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            
            try {
                const response = await fetch('/api/send-shopping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: currentUserEmail, 
                        listTitle: activeShoppingTitle, 
                        listArray: activeShoppingListArray 
                    })
                });
                const res = await response.json();
                
                alert(res.status === 'success' ? res.message : "Błąd: " + res.message);
                btn.innerHTML = oHtml; lucide.createIcons();
            } catch (error) {
                alert("Krytyczny błąd połączenia.");
                btn.innerHTML = oHtml; lucide.createIcons();
            }
        }
